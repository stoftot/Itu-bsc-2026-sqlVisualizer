name: Build

on:
  workflow_call:

jobs:
  Visualizer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sqlVisualizer/visualizer/
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore
