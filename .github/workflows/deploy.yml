name: Deploy
permissions: write-all

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build.yml
  
  create-docker-image:
    needs: build
    uses: ./.github/workflows/create-docker-image.yml
    secrets: inherit 

  deploy-to-digitalocean:
    needs: create-docker-image
    uses: ./.github/workflows/deploy-to-digitalocean.yml
    secrets: inherit
